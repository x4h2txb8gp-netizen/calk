<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Калькулятор влажности</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="calc">
  <div class="card">
    <div class="head"><h2>Калькулятор влажности</h2></div>
    <div class="info">⚡ Выберите направление расчёта</div>

    <div class="row">
      <div class="input-group">
        <label>Из чего:</label>
        <select id="from" onchange="update()">
          <option value="">— выберите —</option>
          <option value="RH">Относительная влажность</option>
          <option value="abs">Абсолютная влажность</option>
          <option value="mix">Влагосодержание</option>
          <option value="dew">Точка росы</option>
        </select>
      </div>
      <div class="input-group">
        <label>Во что:</label>
        <select id="to" onchange="update()">
          <option value="">— выберите —</option>
          <option value="RH">Относительная влажность</option>
          <option value="abs">Абсолютная влажность</option>
          <option value="mix">Влагосодержание</option>
          <option value="dew">Точка росы</option>
        </select>
      </div>
    </div>
    <div id="dirWarn" class="warning" style="display:none"></div>

    <div id="inputs"></div>

    <div class="input-group">
      <label>Точность (знаков после запятой)</label>
      <div class="stepper">
        <button onclick="changePrec(-1)">−</button>
        <span id="prec">5</span>
        <button onclick="changePrec(1)">+</button>
      </div>
    </div>

    <button class="btn" id="calcBtn" onclick="calc()" disabled>➡️ Выберите направление</button>

    <div class="result">
      <p id="resLabel">Результат:</p>
      <div class="result-value" id="resVal">—</div>
      <div class="result-unit" id="resUnit"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
